name: Build NovaMacro Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PyQt5 pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "NovaMacro" main.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaMacro-Windows
          path: dist/NovaMacro.exe
